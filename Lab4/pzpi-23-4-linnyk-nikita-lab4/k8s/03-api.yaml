apiVersion: apps/v1
kind: Deployment
metadata:
  name: langbang-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langbang-api
  template:
    metadata:
      labels:
        app: langbang-api
    spec:
      containers:
        - name: langbang-api
          image: langbang-server:lab
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: langbang-api-config
            - secretRef:
                name: langbang-api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: langbang-api
spec:
  type: LoadBalancer
  selector:
    app: langbang-api
  ports:
    - name: http
      port: 80
      targetPort: 5000
