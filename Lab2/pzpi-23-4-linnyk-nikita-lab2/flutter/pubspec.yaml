name: langbang
description: LangBang language learning — Flutter
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Fonts
  google_fonts: ^6.2.1

  # Image loading
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.69.0

  # Animations
  flutter_animate: ^4.5.0

  # Local preferences (non-sensitive)
  shared_preferences: ^2.3.4

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
